spring.application.name=promptvault-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/promptvault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.port=${SERVER_PORT:8080}

# URL secreta para acesso admin: /api/s/{SECRET}/admin/...
app.admin.secret=${ADMIN_SECRET:change-me}
