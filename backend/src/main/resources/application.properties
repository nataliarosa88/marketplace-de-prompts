spring.application.name=promptvault-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/promptvault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.port=${SERVER_PORT:8080}

# JWT (HMAC)
app.security.jwt.secret=${JWT_SECRET:promptvault-dev-secret-please-change-32chars}
app.security.jwt.issuer=${JWT_ISSUER:promptvault}
app.security.jwt.ttl-seconds=${JWT_TTL_SECONDS:86400}
